<div class="team-card">
    <div class="member_img">
        <img src="{{ include.photo }}" alt="{{ include.name }}">
    </div>
    <div class="member_info">
        <h4>{{ include.name }}</h4>
        <p>{{ include.bio }}</p>
    </div>
    <ul class="social">
        {% if include.twitter_handle %}
            <li><a href="https://x.com/{{ include.twitter_handle }}/" target="_blank" rel="noopener noreferrer"><img src="/assets/icons/icon_media_x_green.svg" alt="X link"></a></li>
        {% endif %}
        {% if include.linkedin_profile %}
            <li><a href="{{ include.linkedin_profile }}" target="_blank" rel="noopener noreferrer"><img src="/assets/icons/icon_media_linkedin_green.svg" alt="linkedin link"></a></li>
        {% endif %}
        {% if include.bluesky_profile %}
            <li><a href="{{ include.bluesky_profile }}" target="_blank" rel="noopener noreferrer"><img src="/assets/icons/icon_media_bluesky_green.svg" alt="BlueSky link"></a></li>
        {% endif %}
        {% if include.github_user %}
            <li><a href="https://github.com/{{ include.github_user }}/" target="_blank" rel="noopener noreferrer"><img src="/assets/icons/icon_media_git_green.svg" alt="github link"></a></li>
        {% endif %}
    </ul>
</div>
