                   <div class="group"><span>18.</span> Course closure: navigation maps.</div>
                   <div class="subgroup"><span>18.1.</span> Overview: topics explored and yet to explore.</div>
                   <div class="subgroup"><span>18.2.</span> Changing perspectives on legacy code.</div>
                </div>'
      languages:
