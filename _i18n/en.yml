    services:
      technical_coaching:
        name: Technical coaching
        description: Two members of Codesai will join your team several days a week in 4 to 6 hour remote sessions to develop functionality together, do code reviews, answer questions, or explore and discuss solutions.
        link: /en/services/technical-coaching/
      team_augmentation:
        name: Team augmentation
        description: Two members of Codesai would join your team several days a week in 6 to 8 hour remote sessions to develop functionality.
        link: /en/services/team-augmentation/
      consultancy:
        name: Consultancy
        description: The objective of these consultancy sessions would be to evaluate the state of your systems, help the team resolve problems and questions, or land new technical practices.
        link: /en/services/consultancy/
    contact:
      title: Interested in any of our services? Tell us what you need!
      text: <p>At Codesai we are always open to listen to our clients' needs. You can write to us at contact@codesai.com or fill out the contact form.</p><p>We will try to get back to you as soon as possible!</p>
      placeholder: I would like to get more information about your services.
