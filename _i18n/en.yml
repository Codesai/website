      </ul>
      <p>www.codesai.com muestra información sobre su Política de cookies en la parte inferior o superior de cualquier
          página del portal con cada inicio de sesión.</p>
      <p>Ante esta información es posible llevar a cabo las siguientes acciones:</p>
