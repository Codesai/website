                    <div class="subgroup"><span>--- 4.2.6.</span> Shortcuts.</div>
                    
                    <div class="group"><span>5.</span> Testing strategies in legacy code.</div>
                    <div class="subgroup"><span>5.1.</span> Types of tests.</div>
                    <div class="subgroup"><span>5.2.</span> Advantages and disadvantages of each type of test.</div>
                    <div class="subgroup"><span>5.3.</span> Test distribution: goals, trade-offs and alternatives.</div>
                    <div class="subgroup"><span>5.4.</span> Testing pyramid in legacy code?</div>
                    <div class="subgroup"><span>5.5.</span> Proposed strategy.</div>
                    
                    <div class="group"><span>6.</span> Characterization tests.</div>
                    <div class="subgroup"><span>6.1.</span> Characterizing legacy code.</div>
                    <div class="subgroup"><span>6.2.</span> Structural Testing.</div>
                    <div class="subgroup"><span>--- 6.2.1.</span> Using coverage tools.</div>
                    <div class="subgroup"><span>--- 6.2.2.</span> Heuristics and criteria for selecting relevant inputs.</div>
                    <div class="subgroup"><span>--- 6.2.3.</span> Coverage criteria.</div>
                    <div class="subgroup"><span>--- 6.2.4.</span> Boundary value analysis.</div>
                    <div class="subgroup"><span>6.3.</span> Mutation Testing: concept, tools and practical use.</div>
                    
                    <div class="group"><span>7.</span> Finding testing points.</div>
                    <div class="subgroup"><span>7.1.</span> Analysing the propagation of the effects of a change.</div>
                    <div class="subgroup"><span>7.2.</span> Points from which to test.</div>
                    <div class="subgroup"><span>--- 7.2.1.</span> Interception points.</div>
                    <div class="subgroup"><span>--- 7.2.2.</span> Pinch points.</div>
                    <div class="subgroup"><span>7.3.</span> Distance from which to test and test scope.</div>
                    
                    <div class="group"><span>8.</span> Other ways of characterizing legacy code.</div>
                    <div class="subgroup"><span>8.1.</span> Golden Master + Sampling.</div>
                    <div class="subgroup"><span>8.2.</span> Approval Testing.</div>
                    <div class="subgroup"><span>--- 8.2.1.</span> Combinatorics & Approval Testing.</div>
                    
                    <div class="group"><span>9.</span> Relationship between lack of cohesion and testability.</div>
                    <div class="subgroup"><span>9.1.</span> Analysis of different cases.</div>
                    <div class="subgroup"><span>--- 9.1.1.</span> Cohesive code.</div>
                    <div class="subgroup"><span>--- 9.1.2.</span> Lack of cohesion due to divergent change (hotspots).</div>
                    <div class="subgroup"><span>--- 9.1.3.</span> Lack of cohesion due to shotgun surgery (change coupling).</div>
                    
                    <div class="group"><span>10.</span> Making changes: TDD in legacy code.</div>
                    
                    <div class="group"><span>11.</span> Making changes: shortcuts when there is no time to cover and modify.</div>
                    <div class="subgroup"><span>11.1.</span> Sprouting.</div>
                    <div class="subgroup"><span>11.2.</span> Wrapping.</div>
                    
                    <div class="group"><span>12.</span> Incremental rewrites.</div>
                    <div class="subgroup"><span>12.1.</span> Why incremental rewrites?</div>
                    <div class="subgroup"><span>12.2.</span> Branch By Abstraction.</div>
                    <div class="subgroup"><span>12.3.</span> Strangler Fig Application.</div>
                    <div class="subgroup"><span>12.4.</span> Testing rewrites in production with experiments.</div>
                    
                    <div class="group"><span>13.</span> Refactoring legacy code.</div>
                    <div class="subgroup"><span>13.1.</span> Refactoring flows.</div>
                    <div class="subgroup"><span>13.2.</span> Goals and strategies.</div>
                    <div class="subgroup"><span>13.3.</span> Refactoring strategies according to DDD subdomains.</div>
                    <div class="subgroup"><span>13.4.</span> Refactorings that improve testability and productivity.</div>
                    <div class="subgroup"><span>--- 13.4.1.</span> Separating infrastructure from business logic.</div>
                    <div class="subgroup"><span>--- 13.4.2.</span> Improving cohesion.</div>
                    
                    <div class="group"><span>14.</span> Introducing DDD in legacy code.</div>
                    <div class="subgroup"><span>14.1.</span> Motivation.</div>
                    <div class="subgroup"><span>14.2.</span> Useful patterns.</div>
                    <div class="subgroup"><span>--- 14.2.1.</span> Bubble Context.</div>
                    <div class="subgroup"><span>--- 14.2.2.</span> Autonomous Bubble.</div>
                    <div class="subgroup"><span>--- 14.2.3.</span> Exposing legacy assets as services.</div>
                    
                    <div class="group"><span>15.</span> Refactoring techniques for hotspots.</div>
                    <div class="subgroup"><span>15.1.</span> How does a hotspot form?</div>
                    <div class="subgroup"><span>15.2.</span> Heuristics for identifying responsibilities.</div>
                    <div class="subgroup"><span>15.3.</span> How to split a hotspot into more cohesive classes?</div>
                    <div class="subgroup"><span>--- 15.3.1.</span> Approach in Working Effectively with Legacy Code.</div>
                    <div class="subgroup"><span>--- 15.3.2.</span> Splinter Pattern.</div>
                    <div class="subgroup"><span>--- 15.3.3.</span> Approach in Object-Oriented Reengineering Patterns.</div>
                    
                    <div class="group"><span>16.</span> Object orientation to improve legacy code.</div>
                    <div class="subgroup"><span>16.1.</span> Applying design patterns to simplify legacy code.</div>
                    <div class="subgroup"><span>--- 16.1.1.</span> Cross-cutting concerns.</div>
                    <div class="subgroup"><span>--- 16.1.2.</span> Separating the main task from associated secondary tasks.</div>
                    <div class="subgroup"><span>--- 16.1.3.</span> Byzantine business rules.</div>
                    <div class="subgroup"><span>--- 16.1.4.</span> Conditional code.</div>
                    <div class="subgroup"><span>--- 16.1.5.</span> Procedural substitutes for polymorphism.</div>
                    <div class="subgroup"><span>--- 16.1.6.</span> Suitable interfaces for stable legacy code.</div>
                    <div class="subgroup"><span>16.2.</span> Code smells that harm or inhibit object orientation.</div>
                    
                   <div class="group"><span>17.</span> Refactoring techniques for inheritance-based seams.</div>
