                    <div class="subgroup"><span>1.3.</span> Legacy code as a business problem.</div>
                    <div class="subgroup"><span>1.4.</span> The human cost of legacy code.</div>
                    <div class="subgroup"><span>1.5.</span> Legacy code can be beneficial for our career.</div>
                    
                    <div class="group"><span>2.</span> Technical debt prioritization.</div>
                    <div class="subgroup"><span>2.1.</span> Technical debt.</div>
                    <div class="subgroup"><span>--- 2.1.1.</span> Original metaphor, inclusive definition and classifications.</div>
                    <div class="subgroup"><span>--- 2.1.2.</span> Costs: principal, recurring interest and accrued interest.</div>
                    <div class="subgroup"><span>--- 2.1.3.</span> Technical debt lifeline.</div>
                    <div class="subgroup"><span>2.2.</span> Prioritization.</div>
                    <div class="subgroup"><span>--- 2.2.1.</span> Continuous inspection.</div>
                    <div class="subgroup"><span>--- 2.2.2.</span> Technical debt contingency.</div>
                    <div class="subgroup"><span>--- 2.2.3.</span> Code behavioral analysis.</div>
                    <div class="subgroup"><span>--- 2.2.4.</span> Hotspots analysis.</div>
                    <div class="subgroup"><span>--- 2.2.5.</span> Product Hurricane Maps.</div>
                    <div class="subgroup"><span>--- 2.2.6.</span> Change Coupling and implicit dependencies analysis.</div>
                    <div class="subgroup"><span>--- 2.2.7.</span> Sum of Coupling (SoC) analysis.</div>
                    <div class="subgroup"><span>--- 2.2.8.</span> Combining analyses: Hotspots, Change Coupling and SoC.</div>
                    
                    <div class="group"><span>3.</span> Evolving legacy code: techniques.</div>
                    <div class="subgroup"><span>3.1.</span> Value in legacy code: behaviour.</div>
                    <div class="subgroup"><span>3.2.</span> Types of changes.</div>
                    <div class="subgroup"><span>3.3.</span> Protecting behaviour.</div>
                    <div class="subgroup"><span>3.4.</span> Cover & Modify.</div>
                    <div class="subgroup"><span>3.5.</span> Testability problems <=> Poor design.</div>
                    
                    <div class="group"><span>4.</span> Introducing tests in untestable code.</div>
