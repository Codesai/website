              personales y se compromete a no compartirla con terceros, excepto cuando la ley le obligue a ello o
              sea necesario para el funcionamiento del sistema. Google no asocia su direccion IP con ninguna otra
              informacion que tenga. Si desea obtener mas informacion acerca de las cookies usadas por Google
              Analytics, por favor acceda a esta direccion:
              https://developers.google.com/analytics/devguides/collection/analyticsjs/cookie-usage?hl=es&amp;csw=1
