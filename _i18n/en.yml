  privacy_policy:
    name: Codesai. Privacy Policy
    title: 'Protección de datos de carácter personal según el RGPD'
    text: '<p>CODESAI DEV S.COOP, en aplicación de la normativa vigente en materia de protección de datos de carácter personal, 
    informa que los datos personales que se recogen a través de los formularios del Sitio web: www.codesai.com, 
    se incluyen en los ficheros automatizados específicos de usuarios de los servicios de CODESAI DEV S.COOP</p>

  <p>La recogida y tratamiento automatizado de los datos de carácter personal tiene como finalidad el mantenimiento de la relación comercial 
  y el desempeño de tareas de información, formación, asesoramiento y otras actividades propias de CODESAI DEV S.COOP</p>

  <p>Estos datos únicamente serán cedidos a aquellas entidades que sean necesarias con el único objetivo de dar cumplimiento a la finalidad 
  anteriormente expuesta.</p>

  <p>CODESAI DEV S.COOP adopta las medidas necesarias para garantizar la seguridad, integridad y confidencialidad de los datos conforme 
  a lo dispuesto en el Reglamento (UE) 2016/679 del Parlamento Europeo y del Consejo, de 27 de abril de 2016, 
  relativo a la protección de las personas físicas en lo que respecta al tratamiento de datos personales y a la 
  libre circulación de los mismos, y derogando la antigua LOPD, la nueva Ley Orgánica 3/2018, de 5 diciembre, de Protección de Datos y 
  Garantía de los Derechos Digitales (LOPDGDD).</p>

  <p>El usuario podrá en cualquier momento ejercitar los derechos de acceso, oposición, rectificación, cancelación, limitación y portabilidad 
  reconocidos en el citado Reglamento (UE). El ejercicio de estos derechos puede realizarlo el propio usuario a través de 
  email a: operaciones@codesai.com o en la dirección: Calle Santiago de Compostela, 22, 2B, C.P. 33012 - Oviedo (Asturias).</p>

  <p>El usuario manifiesta que todos los datos facilitados por él son ciertos y correctos, y se compromete a mantenerlos actualizados, comunicando 
  los cambios a CODESAI DEV S.COOP</p>

  <h2>Finalidad del tratamiento de los datos personales:</h2>
  <h3>¿Con qué finalidad trataremos tus datos personales?</h3>

  <p>En CODESAI DEV S.COOP, trataremos tus datos personales recabados a través del Sitio Web: www.codesai.com, con las siguientes finalidades:</p>

  <ol><li>Prestar sus servicios de acuerdo con las necesidades particulares de los clientes, con el fin de cumplir los 
  contratos suscritos por la misma.</li></ol>
  <p>Te recordamos que puedes oponerte al envío de comunicaciones comerciales por cualquier vía y en cualquier momento, 
  remitiendo un correo electrónico a la dirección anteriormente indicada.</p>
  <p>Los campos de dichos registros son de cumplimentación obligatoria, siendo imposible realizar las finalidades expresadas si no se aportan 
  esos datos.</p>

  <h3>¿Por cuánto tiempo se conservan los datos personales recabados?</h3>

  <p>Los datos personales proporcionados se conservarán mientras se mantenga la relación comercial o no solicites su supresión y 
