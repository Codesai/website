    changing_legacy:
      title: Codesai. Changing Legacy Code
      name: Changing Legacy Code
      text: '<p>In this training we will learn how to change and improve legacy code in a safe and effective way.</p>
                 <p>We will learn different techniques to introduce tests in legacy code, and how to gradually and sustainably improve its design.</p>
                 <p>The training will combine theory and discussion sessions presenting the different concepts, techniques, patterns and strategies, with practical sessions in the form of katas in which we will apply the most important techniques.</p>'
      call_to_action:
        link: /en/trainings/changing-legacy/#call-to-action
        title: OK! I am interested in taking the Changing Legacy Code Course
        text: <p>If you wish to apply or if you still have any questions about this course, please contact us at contact@codesai.com or fill out the contact form.</p><p>We will try to get back to you as soon as possible!</p>
        placeholder: I would be interested in receiving updates about the courses and upcoming open dates
      content:
        title: Contents
        agenda: '<div class="topics">
                    <div class="group"><span>1.</span> What is legacy code?</div>
                    <div class="subgroup"><span>1.1.</span> Definitions.</div>
